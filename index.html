<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menyiapkan Link...</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f5f5;text-align:center;padding-top:80px;color:#333}
    .box{background:#fff;max-width:400px;margin:auto;padding:30px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
    #timer{font-size:48px;font-weight:bold;color:#e74c3c;margin:20px 0}
    .btn{display:none;background:#27ae60;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:15px}
  </style>
</head>
<body>
  <div class="box">
    <h2>Link Sedang Disiapkan</h2>
    <p>File akan terbuka otomatis dalam:</p>
    <div id="timer">2</div>
    <p>Jangan tutup halaman ini</p>
    <a id="manualBtn" class="btn" href="#">Klik Disini Jika Tidak Otomatis</a>
  </div>
  <script>
    const tujuan = new URLSearchParams(window.location.search).get('to');
    let detik = 2;
    const timer = document.getElementById('timer');
    const btn = document.getElementById('manualBtn');
    const countdown = setInterval(() => {
      detik--;
      timer.textContent = detik;
      if (detik <= 0) {
        clearInterval(countdown);
        if (tujuan) window.location.href = tujuan;
      }
    }, 1000);
    setTimeout(() => {
      if(tujuan) {
        btn.style.display = "inline-block";
        btn.href = tujuan;
      }
    }, 3000);
  </script>
  
<script src="https://pl29169098.profitablecpmratenetwork.com/65/2d/4e/652d4ef4510d0b245a5d85b625a7bc08.js"></script>

</body>
</html>
